# ============================================================================
# Extra Chill — bot blocking + abuse mitigation
# ============================================================================
# Install path: /etc/nginx/conf.d/bot-blocking.conf
#
# This file lives at http {} scope. Files in /etc/nginx/conf.d/ are
# auto-included by the Debian/Ubuntu nginx package via the top-level
# `include /etc/nginx/conf.d/*.conf;` in /etc/nginx/nginx.conf.
#
# The maps and limit_req_zones defined here become available to every
# server { } block. Wire them into the extrachill server block via the
# if-guards and limit_req directives in server-snippet.conf.
#
# History:
#   2026-05-10 — Created in response to Pinterestbot DOS via slow past=1
#     calendar queries that saturated PHP-FPM workers across the network.
#   2026-05-10 — Removed `2a01:4ff:f0:f75b::1` from the blocked IP map. It
#     was the VPS's own IPv6 path used by local services AND Cloudflare's
#     IPv6 origin connections; blocking it broke studio.extrachill.com via
#     CF. See WARNING note above the map.
#   2026-05-12 — Added wp_logged_in cookie carveout to the /wp-json/
#     rate-limit zone. Gutenberg media uploads fire many REST calls per
#     image (sideload per intermediate size + finalize + polls) and were
#     hitting 429s on editor sessions. Live config drifted ahead of the
#     docs at this point; this revision reconciles them.
#   2026-05-18 — Extended $bad_uri with scanner-probe paths and added
#     `wp_login` limit_req_zone for /login/ + /wp-login.php brute-force
#     protection (per #23). The /login/ path was responsible for 86% of
#     all 404 traffic across the network (158,488 hits in 14d) before
#     this was added. wp-login-ratelimit.conf has been deleted; its
#     contents were consolidated here (zone) and in server-snippet.conf
#     (location blocks).
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Block bad user agents (return 429 — Pinterest backs off slightly more
#    on 429 than on 403, and it's a more honest answer than "forbidden")
# ---------------------------------------------------------------------------
map $http_user_agent $bad_bot {
    default                          0;
    "~*Pinterestbot"                 1;
    "~*PinterestBot"                 1;
    "~*Pinterest/"                   1;
}

# ---------------------------------------------------------------------------
# 2. Block bad IPs — credential scanners, aggressive scrapers
# ---------------------------------------------------------------------------
#
# WARNING: before adding an IP here, sanity-check that it is NOT one of:
#   - This VPS's own public IPv4 or IPv6 address
#   - A Hetzner internal-network IPv6 address that the host itself uses
#     for local service-to-service traffic (e.g. `2a01:4ff:f0:f75b::1`)
#   - A Cloudflare edge IP (https://www.cloudflare.com/ips/) — CF connects
#     to origin from these ranges, and Cloudflare-fronted subdomains will
#     emit "HTTP 520" to end users when the origin returns 444
#
# High hit counts on an IP are not by themselves evidence of abuse — local
# services (Action Scheduler async runners hitting admin-ajax.php, mautrix
# bridges syncing, monitoring loops, internal WP cron) often dominate the
# access log for the VPS's own IP. Always check the user-agent and request
# URI alongside the IP before deciding it's a scraper.
#
# 2026-05-10 — `2a01:4ff:f0:f75b::1` was added here as a "Hetzner curl
# scraper" but it's this server's own IPv6 network path. Local services
# AND Cloudflare's IPv6 origin connections both come from it. Adding it
# silently broke studio.extrachill.com via CF until the rule was removed.
#
map $remote_addr $blocked_ip {
    default                          0;
    "45.148.10.160"                  1;   # /config.env credential scanner — 5,675 hits
}

# ---------------------------------------------------------------------------
# 3. Block requests probing for leaked secrets and known scanner paths
# ---------------------------------------------------------------------------
#
# All of these return 444 (close connection without response) via the
# `if ($bad_uri) { return 444; }` guard in server-snippet.conf. The intent
# is to never leak that the path exists and to never spend a PHP-FPM worker
# on traffic that has no legitimate use case.
#
map $request_uri $bad_uri {
    default                          0;

    # Original credential-scrape patterns (2026-05-10) ----------------------
    "~*/\.env"                       1;
    "~*/config\.env"                 1;
    "~*/api/shared/config\.env"      1;
    "~*/\.git/"                      1;
    "~*/\.aws/"                      1;
    "~*/wp-config\.php\."            1;   # backup variants like wp-config.php.bak

    # Scanner probes — added 2026-05-18 per #23 -----------------------------
    # These URLs were the long tail of the 404 burst that pushed 404 traffic
    # +262% in 28 days. Each pattern is a known scanner signature with no
    # legitimate consumer on this network.
    #
    "~*^/settings\.py$"              1;   # Django settings dump (166 hits/14d)
    "~*^/config/database\.yml$"      1;   # Rails db creds (149 hits/14d)
    "~*^/actuator/"                  1;   # Spring Boot Actuator (52+ hits/14d)
    "~*^/api/v[0-9]+/?(\?|$)"        1;   # /api/v1, /api/v2 probes
    "~*^/api/health"                 1;   # /api/health probes (65+ hits/14d)
    "~*^/health\?X-App-Env"          1;   # null-byte env probe (65 hits/14d)
    "~*\?X-App-Env="                 1;   # null-byte env probe, any path
    "~*^/cgi-bin/"                   1;   # /cgi-bin/ probes (28 hits/14d)
    "~*^/wp-config\.php\.bak"        1;   # explicit .bak (covered above but explicit)
    "~*^/wp-config\.php~"            1;   # vim swap variant
    "~*^/wp-includes/.*\.(php|html)$" 1;  # wp-includes-probe class (354 hits/14d)
}

# ---------------------------------------------------------------------------
# 4. Per-IP rate limit zone for /wp-json/ — prevents one bot from
#    grabbing many FPM workers simultaneously
#
#    Authenticated WordPress sessions are exempted: when the request carries
#    a wordpress_logged_in_* cookie, $limit_key is empty and nginx skips
#    the limit. This keeps wp-admin editors (media uploads, autosave, the
#    realtime collab provider) from getting 429'd while still rate-limiting
#    anonymous traffic and bots hitting /wp-json/.
#
#    Symptom that prompted this carveout: Gutenberg media uploads fire many
#    REST calls per image (sideload per intermediate size + finalize +
#    polls). Burst traffic on editor sessions can appear as bot traffic;
#    the logged-in carveout prevents admins/editors from being rate-limited
#    during normal editorial workflows.
# ---------------------------------------------------------------------------
map $http_cookie $wp_logged_in {
    default                          0;
    "~*wordpress_logged_in_"         1;
}

map $wp_logged_in $limit_key {
    0       $binary_remote_addr;
    1       "";
}

limit_req_zone $limit_key zone=wpjson:10m rate=5r/s;

# ---------------------------------------------------------------------------
# 5. Per-IP rate limit zone for /wp-login.php and /login/ — brute-force
#    login mitigation (added 2026-05-18 per #23)
#
#    3 req/min per IP with burst 5 is well under any human's login pace
#    and shuts down credential stuffing without hand-maintaining an IP
#    list. The /login/ path was responsible for 86% of all 404 traffic
#    across the network (158,488 hits in 14d) before this was added —
#    each GET booted WordPress to serve a 301 redirect chain, which the
#    attacker was exploiting because nothing throttled them.
#
#    Wired into the server block via the location = /wp-login.php and
#    location = /login/ blocks in server-snippet.conf.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=wp_login:10m rate=3r/m;

# ---------------------------------------------------------------------------
# 6. Global rate-limit response status
# ---------------------------------------------------------------------------
limit_req_status 429;
