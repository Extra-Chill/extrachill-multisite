# ============================================================================
# Extra Chill — bot blocking + abuse mitigation
# ============================================================================
# Install path: /etc/nginx/conf.d/bot-blocking.conf
#
# This file lives at http {} scope. Files in /etc/nginx/conf.d/ are
# auto-included by the Debian/Ubuntu nginx package via the top-level
# `include /etc/nginx/conf.d/*.conf;` in /etc/nginx/nginx.conf.
#
# The maps and limit_req_zone defined here become available to every
# server { } block. Wire them into the extrachill server block via the
# if-guards and limit_req directives in server-snippet.conf.
#
# History:
#   2026-05-10 — Created in response to Pinterestbot DOS via slow past=1
#     calendar queries that saturated PHP-FPM workers across the network.
#   2026-05-10 — Removed `2a01:4ff:f0:f75b::1` from the blocked IP map. It
#     was the VPS's own IPv6 path used by local services AND Cloudflare's
#     IPv6 origin connections; blocking it broke studio.extrachill.com via
#     CF. See WARNING note above the map.
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Block bad user agents (return 429 — Pinterest backs off slightly more
#    on 429 than on 403, and it's a more honest answer than "forbidden")
# ---------------------------------------------------------------------------
map $http_user_agent $bad_bot {
    default                          0;
    "~*Pinterestbot"                 1;
    "~*PinterestBot"                 1;
    "~*Pinterest/"                   1;
}

# ---------------------------------------------------------------------------
# 2. Block bad IPs — credential scanners, aggressive scrapers
# ---------------------------------------------------------------------------
#
# WARNING: before adding an IP here, sanity-check that it is NOT one of:
#   - This VPS's own public IPv4 or IPv6 address
#   - A Hetzner internal-network IPv6 address that the host itself uses
#     for local service-to-service traffic (e.g. `2a01:4ff:f0:f75b::1`)
#   - A Cloudflare edge IP (https://www.cloudflare.com/ips/) — CF connects
#     to origin from these ranges, and Cloudflare-fronted subdomains will
#     emit "HTTP 520" to end users when the origin returns 444
#
# High hit counts on an IP are not by themselves evidence of abuse — local
# services (Action Scheduler async runners hitting admin-ajax.php, mautrix
# bridges syncing, monitoring loops, internal WP cron) often dominate the
# access log for the VPS's own IP. Always check the user-agent and request
# URI alongside the IP before deciding it's a scraper.
#
# 2026-05-10 — `2a01:4ff:f0:f75b::1` was added here as a "Hetzner curl
# scraper" but it's this server's own IPv6 network path. Local services
# AND Cloudflare's IPv6 origin connections both come from it. Adding it
# silently broke studio.extrachill.com via CF until the rule was removed.
#
map $remote_addr $blocked_ip {
    default                          0;
    "45.148.10.160"                  1;   # /config.env credential scanner — 5,675 hits
}

# ---------------------------------------------------------------------------
# 3. Block requests probing for leaked secrets (config.env, .env, .git, etc.)
# ---------------------------------------------------------------------------
map $request_uri $bad_uri {
    default                          0;
    "~*/\.env"                       1;
    "~*/config\.env"                 1;
    "~*/api/shared/config\.env"      1;
    "~*/\.git/"                      1;
    "~*/\.aws/"                      1;
    "~*/wp-config\.php\."            1;   # backup variants like wp-config.php.bak
}

# ---------------------------------------------------------------------------
# 4. Per-IP rate limit zone for /wp-json/ — prevents one bot from
#    grabbing many FPM workers simultaneously
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=wpjson:10m rate=5r/s;
limit_req_status 429;
