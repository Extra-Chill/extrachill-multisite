# ============================================================================
# Extra Chill — server-block snippet for bot/IP/URI blocking + rate limits
# ============================================================================
# Install: paste these directives into the HTTPS server { } block of the
# Extra Chill site config (e.g. /etc/nginx/sites-available/extrachill).
#
# Depends on: /etc/nginx/conf.d/bot-blocking.conf — that file defines the
# $bad_bot, $blocked_ip, $bad_uri maps and the `wpjson` + `wp_login`
# limit_req_zones that this snippet references.
#
# The if-guards must run early in the server block (before location {}
# matches) so blocked requests never reach PHP-FPM. The location blocks
# can sit anywhere among the other location blocks — exact-match (`=`)
# takes precedence over regex, so the /wp-login.php location wins over
# the generic `location ~ \.php$` block regardless of order. Readability
# still matters: keep them grouped near the top of the location list.
#
# Status codes:
#   429 — bad bot or rate-limit hit (signals "back off" — Pinterest
#         honors this slightly better than 403; brute-force clients
#         either back off or burn themselves on the limit)
#   444 — nginx-only "close connection without response" — used for
#         credential scanners, credential-probe URIs, and author
#         enumeration so we don't even leak that the path exists
# ============================================================================

# ---- Abuse mitigation (added 2026-05-10) ----
# Block bad bots, bad IPs, and credential-probe URIs at the edge
# before they hit PHP-FPM. See /etc/nginx/conf.d/bot-blocking.conf.
if ($bad_bot)    { return 429; }
if ($blocked_ip) { return 444; }
if ($bad_uri)    { return 444; }
# ---------------------------------------------

# ---- Author enumeration block (added 2026-05-18 per #23) ----
# /?author=N is a pure WordPress username-enumeration vector: WP
# redirects to the author archive (/author/<username>/), which leaks
# the login name. 76 hits over 14d in production with zero legitimate
# use case — every consumer that needs author info has a proper API.
# Return 444 (close connection) so we don't even confirm the parameter
# was recognized.
if ($args ~* "(^|&)author=[0-9]+") {
    return 444;
}
# -------------------------------------------------------------

# Rate-limit /wp-json/ per IP (5 req/s, burst 10) — protects FPM
# from any single client (legit or bot) grabbing all the workers.
# Logged-in WordPress sessions are exempt via the $limit_key map in
# bot-blocking.conf (editors uploading media must not be 429'd).
location /wp-json/ {
    limit_req zone=wpjson burst=10 nodelay;
    try_files $uri $uri/ /index.php?$args;
}

# ---- /wp-login.php + /login/ rate limit (added 2026-05-18 per #23) ----
#
# Why: the /login/ path was responsible for 86% of all 404 traffic
# across the network — 158,358 hits / 14d, dwarfing every other
# 4xx pattern combined. Each GET boots WordPress to serve a 301
# redirect chain (/wp-login.php → /login/ → community.extrachill.com),
# which the attacker was exploiting because nothing throttled them.
#
# 3 req/min per IP with burst 5 covers any human typing a password
# wrong twice; everything beyond is brute-force or scanner noise.
# Returns 429 immediately, never boots PHP.
#
# Exact-match locations (`=`) win over regex even without ordering,
# but place these above any generic `location ~ \.php$` block for
# clarity. Depends on the `wp_login` limit_req_zone in bot-blocking.conf.

location = /wp-login.php {
    limit_req zone=wp_login burst=5 nodelay;
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

location = /login/ {
    limit_req zone=wp_login burst=5 nodelay;
    try_files $uri $uri/ /index.php?$args;
}

location = /login {
    return 301 /login/;
}
# ------------------------------------------------------------------------
