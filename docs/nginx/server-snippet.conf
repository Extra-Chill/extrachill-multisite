# ============================================================================
# Extra Chill — server-block snippet for bot/IP/URI blocking + /wp-json/ RL
# ============================================================================
# Install: paste these directives into the HTTPS server { } block of the
# Extra Chill site config (e.g. /etc/nginx/sites-available/extrachill).
#
# Depends on: /etc/nginx/conf.d/bot-blocking.conf — that file defines the
# $bad_bot, $blocked_ip, $bad_uri maps and the `wpjson` limit_req_zone
# that this snippet references.
#
# The if-guards must run early in the server block (before location {}
# matches) so blocked requests never reach PHP-FPM. The /wp-json/
# location can sit anywhere among the other location blocks.
#
# Status codes:
#   429 — bad bot (signals "back off" — Pinterest honors this slightly
#         better than 403)
#   444 — nginx-only "close connection without response" — used for
#         credential scanners and credential-probe URIs so we don't
#         even leak that the path exists
# ============================================================================

# ---- Abuse mitigation (added 2026-05-10) ----
# Block bad bots, bad IPs, and credential-probe URIs at the edge
# before they hit PHP-FPM. See /etc/nginx/conf.d/bot-blocking.conf.
if ($bad_bot)    { return 429; }
if ($blocked_ip) { return 444; }
if ($bad_uri)    { return 444; }
# ---------------------------------------------

# Rate-limit /wp-json/ per IP (5 req/s, burst 10) — protects FPM
# from any single client (legit or bot) grabbing all the workers.
location /wp-json/ {
    limit_req zone=wpjson burst=10 nodelay;
    try_files $uri $uri/ /index.php?$args;
}
