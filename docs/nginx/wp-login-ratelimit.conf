# ============================================================================
# Extra Chill — /wp-login.php brute-force rate limit
# ============================================================================
# This file has TWO parts that install in different scopes:
#
#   1. The `limit_req_zone` directive belongs at http {} scope. Drop this
#      file into /etc/nginx/conf.d/ alongside bot-blocking.conf so it's
#      auto-included, OR move just the limit_req_zone line into
#      bot-blocking.conf if you prefer one file.
#
#   2. The `location = /wp-login.php` block belongs inside the HTTPS
#      server { } block of the Extra Chill site config. It must sit
#      ABOVE the generic `location ~ \.php$` block so the exact-match
#      wins — nginx picks exact-match (=) over regex.
#
# Why this exists:
#   The 2026-05-10 DOS event surfaced ongoing brute-force probes against
#   /wp-login.php from a rotating cast of IPs (74.91.224.220,
#   208.109.188.137, 31.134.10.163, etc.). 3 req/min per IP with burst 5
#   is well under any human's login pace and shuts down credential
#   stuffing without hand-maintaining an IP list.
#
# Tuning:
#   - 3r/m is intentionally aggressive. Bump to 6r/m if legitimate users
#     hit the limit (unlikely outside of dev/staging password resets).
#   - Status 429 is set globally in bot-blocking.conf via
#     `limit_req_status 429;`.
# ============================================================================

# --- http {} scope (drop this file in /etc/nginx/conf.d/) ---

limit_req_zone $binary_remote_addr zone=wp_login:10m rate=3r/m;


# --- server {} scope (paste this location block into the site config) ---
